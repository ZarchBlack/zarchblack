<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Gradients for terminal UI -->
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a15"/>
      <stop offset="50%"  stop-color="#1a0a25"/>
      <stop offset="100%" stop-color="#0a0a15"/>
    </linearGradient>

    <linearGradient id="titleBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6e40c9"/>
      <stop offset="50%"  stop-color="#9d5cff"/>
      <stop offset="100%" stop-color="#6e40c9"/>
    </linearGradient>

    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00ff00" stop-opacity="0.05"/>
      <stop offset="50%"  stop-color="#00ff00" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#00ff00" stop-opacity="0.05"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9d5cff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6e40c9" stop-opacity="0"/>
    </radialGradient>

    <filter id="termGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/></feMerge>
    </filter>

    <style>
      .window-line { stroke: #6e40c9; stroke-width: 1; }
      .text-cursor { animation: blink 1s infinite; }
      .text-output { font-family: 'Courier New', monospace; }
      .text-prompt { fill: #9d5cff; }
      .text-input  { fill: #00ff00; }
      .text-system { fill: #7b52e0; }
      
      @keyframes blink { 0%,49%{ opacity: 1; } 50%,100%{ opacity: 0.3; } }
    </style>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="400" fill="url(#termBg)"/>

  <!-- Scanlines overlay -->
  <rect width="1200" height="400" fill="url(#scanline)"/>

  <!-- Window border -->
  <rect x="40" y="30" width="1120" height="340" fill="none" stroke="#6e40c9" stroke-width="2" rx="8"/>

  <!-- Title bar -->
  <rect x="40" y="30" width="1120" height="35" fill="url(#titleBar)" rx="8" ry="8"/>

  <!-- Title bar controls (minimize, maximize, close) -->
  <circle cx="80" cy="47" r="4" fill="#ff6b6b" opacity="0.7"/>
  <circle cx="105" cy="47" r="4" fill="#ffd93d" opacity="0.7"/>
  <circle cx="130" cy="47" r="4" fill="#6bcf7f" opacity="0.7"/>

  <!-- Window title -->
  <text x="600" y="50" text-anchor="middle" 
        font-family="Arial, sans-serif" font-size="14" font-weight="bold"
        fill="#f0f6fc">
    terminal@zarchblack ~ zarch-hacking
  </text>

  <!-- Terminal content area -->
  <rect x="50" y="70" width="1100" height="290" fill="#0a0a15" opacity="0.9"/>

  <!-- Glow effect background -->
  <ellipse cx="600" cy="200" rx="400" ry="150" fill="url(#glow)"/>

  <!-- Command prompt section -->
  <text x="70" y="100" class="text-output text-prompt" font-size="13">
    $ 
  </text>
  <text x="95" y="100" class="text-output text-input" font-size="13">
    zarch-hacking --interface gui
  </text>

  <!-- System output lines -->
  <text x="70" y="125" class="text-output text-system" font-size="12">
    [*] Initializing ZarchBlack Security Framework...
  </text>

  <text x="70" y="150" class="text-output text-input" font-size="12">
    [+] Loading BlackArch Tools: 2000+ tools available
  </text>

  <text x="70" y="175" class="text-output text-input" font-size="12">
    [+] Categories: Reconnaissance, Scanning, Exploitation, Post-Exploitation
  </text>

  <text x="70" y="200" class="text-output text-input" font-size="12">
    [+] Initializing isolated testing environments...
  </text>

  <text x="70" y="225" class="text-output text-input" font-size="12">
    [+] Security tools indexed and ready
  </text>

  <!-- Cursor -->
  <text x="70" y="250" class="text-output text-prompt text-cursor" font-size="13">
    $ 
  </text>
  <rect x="95" y="240" width="8" height="14" fill="#9d5cff" class="text-cursor" opacity="0.7"/>

  <!-- Status indicators at bottom -->
  <line x1="50" y1="360" x2="1150" y2="360" stroke="#6e40c9" stroke-width="1" opacity="0.5"/>

  <!-- Status text -->
  <text x="70" y="375" class="text-output text-system" font-size="11">
    Status: Connected [✓]  Security Level: HIGH  Framework: Active [RUN]
  </text>

  <!-- Corner accent marks -->
  <line x1="50" y1="30" x2="80" y2="30" stroke="#9d5cff" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="30" x2="50" y2="60" stroke="#9d5cff" stroke-width="2" opacity="0.6"/>

  <line x1="1150" y1="30" x2="1120" y2="30" stroke="#9d5cff" stroke-width="2" opacity="0.6"/>
  <line x1="1150" y1="30" x2="1150" y2="60" stroke="#9d5cff" stroke-width="2" opacity="0.6"/>

  <line x1="50" y1="370" x2="80" y2="370" stroke="#9d5cff" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="340" x2="50" y2="370" stroke="#9d5cff" stroke-width="2" opacity="0.6"/>

  <line x1="1150" y1="370" x2="1120" y2="370" stroke="#9d5cff" stroke-width="2" opacity="0.6"/>
  <line x1="1150" y1="340" x2="1150" y2="370" stroke="#9d5cff" stroke-width="2" opacity="0.6"/>

  <!-- ZarchBlack branding in corner -->
  <text x="1100" y="395" text-anchor="end" class="text-output text-system" font-size="10">
    ZarchBlack v1.0
  </text>

</svg>
